<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ | Trail Scan</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="login-page">
  <main class="card login-card">
    <h1>Trail Scan Admin</h1>
    <p class="muted">เข้าสู่ระบบเพื่อจัดการ Event, Start, CP และ Finish</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">อีเมล</label>
        <input id="email" type="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input id="password" type="password" autocomplete="current-password" minlength="6" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">เข้าสู่ระบบ</button>
    </form>

    <hr style="border:0;border-top:1px solid #dbe3ed;margin:18px 0">

    <form id="signup-form">
      <div class="form-group">
        <label for="signup-name">ชื่อผู้ใช้งาน</label>
        <input id="signup-name" type="text" required>
      </div>
      <div class="form-group">
        <label for="signup-email">อีเมลใหม่</label>
        <input id="signup-email" type="email" required>
      </div>
      <div class="form-group">
        <label for="signup-password">รหัสผ่านใหม่</label>
        <input id="signup-password" type="password" minlength="6" required>
      </div>
      <button class="btn" type="submit" style="width:100%">สร้างบัญชี Admin</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/api/config"></script>
  <script src="assets/common.js"></script>
  <script src="assets/login.js"></script>
</body>
</html>
