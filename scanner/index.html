<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#061915"><title>Rapid Scanner | Trail Scan</title><link rel="manifest" href="../manifest.webmanifest"><link rel="stylesheet" href="../assets/css/app.css"></head><body style="background:#061915"><section id="setup" class="setup"><div class="brand"><div class="logo">TS</div><div><strong>Rapid Scanner</strong><small class="muted" style="display:block">ตั้งค่าเครื่องครั้งแรก</small></div></div><form id="setupForm" class="form" style="margin-top:20px"><label>องค์กร<select id="org" required></select></label><label>Event<select id="event" required></select></label><label>จุดสแกน<select id="point" required></select></label><label>อุปกรณ์<select id="device"><option value="">ไม่ผูกอุปกรณ์</option></select></label><button id="prepare" class="btn btn-secondary" type="button">ดาวน์โหลดข้อมูล Offline</button><button class="btn btn-primary">เปิดกล้องสแกน</button><a class="btn btn-secondary" href="../admin/index.html">กลับหน้า Admin</a></form><p id="setupMsg" class="message"></p></section><main id="scanner" class="scanner" hidden><header class="scan-top"><div><strong id="pointName">—</strong><small id="eventName" style="display:block;opacity:.6">—</small></div><button id="net" class="online">● ONLINE</button></header><section class="stage"><div id="reader"></div><div class="guide"><div class="box"></div></div><div id="result" class="result"><div><div id="resultIcon" style="font-size:4rem">✓</div><h2 id="resultTitle">บันทึกสำเร็จ</h2><div id="resultBib" class="bib">T25-001</div><p id="resultName"></p><p id="resultDetail"></p></div></div></section><footer class="scan-foot"><div class="scan-stats"><div><strong id="count">0</strong><small>สแกนเครื่องนี้</small></div><div><strong id="pending">0</strong><small>รอ Sync</small></div><div><strong id="lastSync">—</strong><small>Sync ล่าสุด</small></div></div><div class="scan-btns"><button id="sync">↻ Sync</button><button id="manual">⌨ BIB</button><button id="torch">🔦 ไฟฉาย</button><button id="showLog">☷ รายการ</button></div></footer></main><section id="log" class="local-log" hidden><div class="page-head"><div><h2>รายการสแกนในเครื่อง</h2><p class="muted">ข้อมูลจะไม่หายจนกว่าจะ Sync สำเร็จ</p></div><button id="closeLog" class="icon-btn">✕</button></div><div class="card"><div class="table-wrap"><table><thead><tr><th>เวลา</th><th>BIB/Token</th><th>จุด</th><th>Sync</th></tr></thead><tbody id="logRows"></tbody></table></div></div></section><dialog id="manualDlg"><form id="manualForm"><div class="dlg-head"><strong>กรอก BIB ด้วยมือ</strong><button type="button" class="icon-btn close">✕</button></div><div class="dlg-body"><label>เลข BIB<input id="manualBib" required autocomplete="off"></label></div><div class="dlg-foot"><button type="button" class="btn btn-secondary close">ยกเลิก</button><button class="btn btn-primary">บันทึก</button></div></form></dialog><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script><script src="../assets/config.js"></script><script src="../assets/js/core.js"></script><script src="../assets/js/idb.js"></script><script src="../assets/js/scanner.js"></script></body></html>
